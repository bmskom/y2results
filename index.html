<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results - Y2B4 Minitest 2025/2026</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { padding: 10px; width: 80%; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #004494; }
        #result { margin-top: 20px; font-weight: bold; text-align: left;}
        .error { color: red; text-align: center;}
    </style>
</head>
<body>

    <div class="card">
        <img src="images.jpeg" alt="Department Logo" class="logo">
        
        <h2>Y2B4 Minitest Results</h2>
        <input type="password" id="pinInput" placeholder="Enter your secret PIN">
        <br>
        <button onclick="fetchResult()">Check</button>
        
        <div id="result"></div>
    </div>

    <script>
        // PASTE YOUR GOOGLE APPS SCRIPT URL HERE
        const scriptURL = "https://script.google.com/macros/s/AKfycbzqmMeK-1y3w4ARmlQnSXtWUP20d32NmCtwx8C-hLFFHiFMEFrSKLtIbEMZ3yDbQfaP7w/exec";

        async function fetchResult() {
            const pin = document.getElementById('pinInput').value;
            const resultDiv = document.getElementById('result');
            
            if (!pin) {
                resultDiv.innerHTML = "<p class='error'>Please enter a PIN.</p>";
                return;
            }

            resultDiv.innerHTML = "<p style='text-align:center;'>Searching...</p>";

            try {
                const response = await fetch(`${scriptURL}?pin=${pin}`);
                const data = await response.json();

                if (data.found) {
                    resultDiv.innerHTML = `
                        <p><strong>Name:</strong> ${data.name}</p>
                        <p><strong>Score:</strong> ${data.score}</p>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class='error'>${data.message}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = "<p class='error'>Error connecting to database.</p>";
            }
        }
    </script>
</body>
</html>
